spring.application.name=KickOffBet
server.port=8080
spring.jackson.time-zone=UTC

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=60

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Security & JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Swagger
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket.id-cards=id-cards
minio.bucket.teams=teams
minio.bucket.leagues=leagues
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}

# Football Data
football.data.api.url=https://api.football-data.org/v4/
football.data.api.token=${FOOTBALL_DATA_TOKEN}


spring.jackson.parser.max-number-length=100
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Rate Limiting
# Set to true in production when behind a trusted reverse proxy (e.g. nginx) so the
# real client IP is read from X-Forwarded-For; keep false locally to avoid spoofing.
rate-limit.behind-proxy=${BEHIND_PROXY:false}
rate-limit.email.capacity=1
rate-limit.email.refill-minutes=1
rate-limit.auth.capacity=20
rate-limit.auth.refill-hours=1
rate-limit.login.max-attempts=10
rate-limit.global.capacity=60
rate-limit.global.refill-minutes=1
rate-limit.ticket.capacity=10
rate-limit.ticket.refill-minutes=1

# Betting
betting.margin=0.92
betting.home-advantage=1.08
# Lambda = blend of multiplicative (attack*defense/baseline) and additive terms.
# Weight, baselines and home-advantage fitted on 3572 finished matches
# (BTTS 54.8%, 1X2/Over within ~1pp; RMSE 0.54pp).
betting.lambda-multiplicative-weight=0.5
betting.league-baseline-home=1.44
betting.league-baseline-away=1.50
betting.odds-floor=1.10
betting.odds-cap=22.00
betting.lambda-cap=4.0
betting.draw-min-probability=0.10
# Dixon-Coles low-score correction (rho < 0 raises 0-0/1-1 -> more draws, fewer BTTS/Over)
betting.dixon-coles.rho=-0.13
betting.over-probability-cap-15=0.77
betting.over-probability-cap-25=0.60
betting.over-probability-cap-35=0.50
betting.weight.season=0.4
betting.weight.last5=0.6
betting.weight.draw-poisson=0.65
betting.weight.draw-historical=0.35
betting.weight.over-poisson=0.70
betting.weight.over-historical=0.30
betting.weight.btts-poisson=0.75
betting.weight.btts-historical=0.25
betting.poisson.max-goals=10
betting.lines.over-under=1.5,2.5,3.5

# Default metrics (used when a team has no data for a specific metric)
betting.default.season-home-avg-scored=1.25
betting.default.season-home-avg-conceded=1.10
betting.default.season-away-avg-scored=1.05
betting.default.season-away-avg-conceded=1.30
betting.default.season-win-rate=0.38
betting.default.season-draw-rate=0.29
betting.default.season-over25-rate=0.48
betting.default.season-btts-rate=0.45
betting.default.last5-avg-scored=1.25
betting.default.last5-avg-conceded=1.10
betting.default.last5-draw-rate=0.29
betting.default.last5-over25-rate=0.48
betting.default.last5-btts-rate=0.45

#Sync
sync.api-delay-ms=6500
sync.range.past-days=3
sync.range.future-days=7
sync.cooldown-seconds=50

# AML Configuration
aml.monthly-limit=10000
aml.velocity-window-minutes=10
aml.velocity-max-transactions=5
aml.wagering-requirement=0.50
