# Production overrides. Activate with SPRING_PROFILES_ACTIVE=prod.
# NON-SECRET values only. Real secrets stay in the VPS .env and are read via
# ${...} placeholders in application.properties:
#   DB_PASSWORD, JWT_SECRET, MAIL_PASSWORD, FOOTBALL_DATA_TOKEN, MINIO_SECRET_KEY, SEED_USER_PASSWORD
# NEVER put any of those in this file (it is committed to the repo).

# Never let Hibernate mutate the schema in production. Keep 'validate' so a bad
# entity change fails fast instead of silently altering tables.
# First boot against an empty DB: run once with DDL_AUTO=update, then let it fall
# back to validate.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}

# App runs behind the nginx reverse proxy -> read the real client IP from the
# rightmost X-Forwarded-For hop for rate limiting.
rate-limit.behind-proxy=${BEHIND_PROXY:true}

# API docs disabled in production.
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Only your public frontend origin may call the API (comma-separated for several).
# Set CORS_ALLOWED_ORIGINS in the VPS .env to your real domain.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-domain.com}
